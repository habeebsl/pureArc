# YOLOv8 dataset config — basketball rim detector
#
# Directory layout expected:
#   training/dataset/
#     images/
#       train/   ← labelled images for training
#       val/     ← labelled images for validation
#     labels/
#       train/   ← YOLO .txt label files (same stem as image)
#       val/

path: ./training/dataset   # relative to where you run train.py (backend/)
train: images/train
val:   images/val

# Number of classes
nc: 1

# Class names — must match classes.txt used in labelImg
names:
  0: rim
